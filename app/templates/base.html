<!DOCTYPE html>
<html lang="fr" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Trading Analytics{% endblock %}</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            gray: {
              950: '#0a0a0f',
              900: '#111118',
              800: '#1a1a24',
              700: '#252535',
              600: '#3a3a50',
            }
          }
        }
      }
    }
  </script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>

  <style>
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #111118; }
    ::-webkit-scrollbar-thumb { background: #3a3a50; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #5a5a70; }

    /* HTMX loading indicator */
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="h-full text-gray-100 font-sans">

  <!-- Sidebar navigation -->
  <div class="flex h-full">
    <nav class="w-56 bg-gray-900 border-r border-gray-700 flex flex-col shrink-0">
      <div class="px-5 py-4 border-b border-gray-700">
        <span class="text-lg font-bold text-indigo-400 tracking-wide">Trading Analytics</span>
      </div>
      <ul class="flex-1 py-4 space-y-1 px-2">
        <li>
          <a href="/data/"
             class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
                    {% if active_page == 'data' %}bg-indigo-600 text-white{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}
                    transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7C5 4 4 5 4 7z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6M9 16h4"/>
            </svg>
            Données
          </a>
        </li>
        <li>
          <a href="/strategy/"
             class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
                    {% if active_page == 'strategy' %}bg-indigo-600 text-white{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}
                    transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            Stratégie
          </a>
        </li>
        <li>
          <a href="/icmarkets/"
             class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
                    {% if active_page == 'icmarkets' %}bg-indigo-600 text-white{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}
                    transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/>
            </svg>
            IC Markets
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="flex-1 overflow-auto bg-gray-950">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
