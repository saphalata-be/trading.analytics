{% if results %}
<div class="overflow-x-auto">
  <table class="w-full text-sm">
    <thead>
      <tr class="text-left text-gray-500 border-b border-gray-700">
        <th class="pb-2 pr-4 font-medium">Symbole</th>
        <th class="pb-2 pr-4 font-medium">Nom</th>
        <th class="pb-2 pr-4 font-medium">Type</th>
        <th class="pb-2 pr-4 font-medium">Exchange</th>
        <th class="pb-2 pr-4 font-medium">Devise</th>
        <th class="pb-2 font-medium">Action</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-800">
      {% for r in results %}
      <tr class="hover:bg-gray-800/50 transition-colors">
        <td class="py-2 pr-4 font-mono font-semibold text-indigo-300">{{ r.symbol }}</td>
        <td class="py-2 pr-4 text-gray-300">{{ r.name }}</td>
        <td class="py-2 pr-4">
          <span class="px-2 py-0.5 rounded text-xs font-medium
            {% if r.type == 'Forex' %}bg-blue-900/60 text-blue-300
            {% elif r.type == 'Index' %}bg-purple-900/60 text-purple-300
            {% elif r.type == 'Commodity' %}bg-yellow-900/60 text-yellow-300
            {% elif r.type == 'ETF' %}bg-green-900/60 text-green-300
            {% elif r.type == 'Cryptocurrency' %}bg-orange-900/60 text-orange-300
            {% else %}bg-gray-700 text-gray-300{% endif %}">
            {{ r.type }}
          </span>
        </td>
        <td class="py-2 pr-4 text-gray-400 text-xs">{{ r.exchange }}</td>
        <td class="py-2 pr-4 text-gray-400 text-xs">{{ r.currency }}</td>
        <td class="py-2">
          <form hx-post="/data/watchlist/add"
                hx-target="#watchlist-container"
                hx-swap="innerHTML">
            <input type="hidden" name="symbol" value="{{ r.symbol }}" />
            <input type="hidden" name="exchange" value="{{ r.exchange }}" />
            <input type="hidden" name="name" value="{{ r.name }}" />
            <input type="hidden" name="instrument_type" value="{{ r.type }}" />
            <input type="hidden" name="currency" value="{{ r.currency }}" />
            <input type="hidden" name="country" value="{{ r.country }}" />
            <button type="submit"
                    class="flex items-center gap-1 px-3 py-1 bg-indigo-600 hover:bg-indigo-500
                           text-white text-xs font-medium rounded-lg transition-colors">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Ajouter
            </button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<p class="text-gray-500 text-sm">Aucun résultat.</p>
{% endif %}
